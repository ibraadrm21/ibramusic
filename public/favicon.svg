<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="128" fill="#0F0F0F"/>
  <defs>
    <linearGradient id="silver_grad" x1="50" y1="100" x2="462" y2="412" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D1D1D1"/>
      <stop offset="0.5" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#A1A1A1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feOffset dx="4" dy="4" result="offsetBlur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Main serpentine path representing 'is' -->
    <path d="M80 320C120 240 180 340 240 260C280 200 240 120 280 80C320 40 380 80 400 120C420 160 380 220 320 240C260 260 200 340 260 400C320 460 400 420 440 360"
          stroke="url(#silver_grad)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Stylized dot for the 'i' -->
    <path d="M260 50C285 30 305 50 285 80C265 110 245 90 260 50Z" fill="url(#silver_grad)"/>

    <!-- Central Play Button -->
    <path d="M245 235L295 265L245 295V235Z" fill="white"/>
  </g>
</svg>
