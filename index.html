<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ibrastream - A beautiful and premium music player web application using MusicAPI and React" />
    <title>ibraStream - Let The Music Take You Away</title>
    <script>
      // Prevent Chromium and YouTube player from pausing when page visibility changes
      Object.defineProperty(document, 'visibilityState', {
        get: function() { return 'visible'; },
        configurable: true
      });
      Object.defineProperty(document, 'hidden', {
        get: function() { return false; },
        configurable: true
      });
      document.addEventListener('visibilitychange', function(e) {
        e.stopImmediatePropagation();
      }, true);
      window.addEventListener('visibilitychange', function(e) {
        e.stopImmediatePropagation();
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
